<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Facility Booking Reminder Calendar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        @media (min-width: 768px) {
            .container {
                border-radius: 20px;
                margin: 20px auto;
                min-height: auto;
                overflow: hidden;
            }
            body {
                padding: 20px;
            }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header h1 {
            font-size: 22px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
            line-height: 1.4;
        }

        @media (min-width: 768px) {
            .header {
                padding: 30px;
                position: relative;
            }
            .header h1 {
                font-size: 28px;
            }
            .header p {
                font-size: 16px;
            }
        }

        .controls {
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        @media (min-width: 768px) {
            .controls {
                padding: 25px 30px;
                flex-direction: row;
                flex-wrap: wrap;
                align-items: flex-end;
                gap: 20px;
            }
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
        }

        @media (min-width: 768px) {
            .control-group {
                width: auto;
                min-width: 140px;
            }
        }

        .control-group label {
            font-size: 12px;
            font-weight: 600;
            color: #6c757d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .control-group input, .control-group select {
            padding: 14px 12px;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            font-size: 16px;
            width: 100%;
            transition: border-color 0.2s;
            -webkit-appearance: none;
            appearance: none;
            background: white;
        }

        .control-group input:focus, .control-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        /* Custom select arrow for mobile */
        .select-wrapper {
            position: relative;
        }

        .select-wrapper::after {
            content: '▼';
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
            font-size: 12px;
            pointer-events: none;
        }

        /* Day Toggle Switch - Mobile optimized */
        .day-toggle {
            display: flex;
            background: #e9ecef;
            border-radius: 10px;
            padding: 4px;
            gap: 4px;
            width: 100%;
        }

        .day-toggle button {
            flex: 1;
            padding: 14px 20px;
            border: none;
            background: transparent;
            color: #6c757d;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
            font-size: 16px;
            margin: 0;
            touch-action: manipulation;
        }

        .day-toggle button.active {
            background: #667eea;
            color: white;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
        }

        .day-toggle button:active {
            transform: scale(0.98);
        }

        .update-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 16px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            font-size: 16px;
            width: 100%;
            margin-top: 8px;
            touch-action: manipulation;
        }

        .update-btn:hover, .update-btn:active {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        @media (min-width: 768px) {
            .update-btn {
                width: auto;
                margin-top: 0;
                padding: 12px 24px;
            }
        }

        .current-settings {
            padding: 16px 20px;
            background: #e9ecef;
            font-size: 14px;
            color: #495057;
            border-bottom: 1px solid #dee2e6;
            text-align: center;
            line-height: 1.5;
        }

        .current-settings strong {
            color: #667eea;
        }

        @media (min-width: 768px) {
            .current-settings {
                padding: 15px 30px;
                text-align: left;
            }
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            padding: 20px;
        }

        @media (min-width: 640px) {
            .calendar-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
                padding: 30px;
            }
        }

        @media (min-width: 1024px) {
            .calendar-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .booking-card {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 14px;
            padding: 20px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            touch-action: manipulation;
        }

        .booking-card:active {
            transform: scale(0.98);
        }

        @media (min-width: 768px) {
            .booking-card:hover {
                transform: translateY(-5px);
                box-shadow: 0 10px 30px rgba(0,0,0,0.1);
                border-color: #667eea;
            }
        }

        .booking-card.past {
            opacity: 0.6;
            background: #f8f9fa;
        }

        .booking-card.upcoming {
            border-color: #28a745;
            background: #f8fff8;
        }

        .booking-card.today-reminder {
            border-color: #ffc107;
            background: #fffbf0;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 193, 7, 0.4); }
            50% { box-shadow: 0 0 0 12px rgba(255, 193, 7, 0); }
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .booking-number {
            background: #667eea;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
        }

        .status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-past { background: #6c757d; color: white; }
        .status-today { background: #ffc107; color: #212529; }
        .status-upcoming { background: #28a745; color: white; }

        .date-section {
            margin-bottom: 14px;
        }

        .date-label {
            font-size: 12px;
            color: #6c757d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .date-value {
            font-size: 18px;
            font-weight: 700;
            color: #212529;
            line-height: 1.3;
        }

        @media (min-width: 768px) {
            .date-value {
                font-size: 20px;
            }
        }

        .date-value.reminder {
            color: #667eea;
        }

        .date-value.booking {
            color: #28a745;
        }

        .days-until {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #e9ecef;
            font-size: 15px;
            color: #6c757d;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }

        .days-until.urgent {
            color: #dc3545;
            font-weight: 700;
        }

        .empty-state {
            text-align: center;
            padding: 60px 30px;
            color: #6c757d;
            grid-column: 1 / -1;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .legend {
            padding: 20px;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        @media (min-width: 640px) {
            .legend {
                flex-direction: row;
                justify-content: center;
                gap: 30px;
                padding: 20px 30px;
            }
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            color: #6c757d;
            font-weight: 500;
        }

        .legend-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .dot-past { background: #6c757d; }
        .dot-today { background: #ffc107; }
        .dot-upcoming { background: #28a745; }

        /* Touch-friendly scroll for mobile */
        @media (max-width: 767px) {
            .calendar-grid {
                padding-bottom: 40px;
            }
            
            /* Prevent zoom on input focus for iOS */
            input[type="date"], input[type="number"], select {
                font-size: 16px;
            }
        }

        /* Pull to refresh visual indicator space */
        .spacer {
            height: 20px;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📅 Facility Booking Calendar</h1>
            <p>Bi-weekly bookings with 1-month advance reminders</p>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>First Booking Date</label>
                <input type="date" id="startDate" value="2026-05-03">
            </div>
            
            <div class="control-group">
                <label>Booking Day</label>
                <div class="day-toggle">
                    <button type="button" id="btnSunday" class="active" onclick="setDay(0)">Sunday</button>
                    <button type="button" id="btnSaturday" onclick="setDay(6)">Saturday</button>
                </div>
            </div>

            <div class="control-group">
                <label>Number of Bookings</label>
                <input type="number" id="count" value="12" min="1" max="52">
            </div>

            <div class="control-group">
                <label>Frequency</label>
                <div class="select-wrapper">
                    <select id="frequency">
                        <option value="14">Every 2 weeks</option>
                        <option value="7">Weekly</option>
                        <option value="21">Every 3 weeks</option>
                        <option value="28">Monthly</option>
                    </select>
                </div>
            </div>

            <button class="update-btn" onclick="generateCalendar()">Update Calendar</button>
        </div>

        <div class="current-settings" id="currentSettings">
            Current: <strong>Every 2 weeks on Sunday</strong> starting <strong>May 3, 2026</strong>
        </div>

        <div class="calendar-grid" id="calendarGrid">
            <!-- Generated by JavaScript -->
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-dot dot-past"></div>
                <span>Past Bookings</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot dot-today"></div>
                <span>Book Today</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot dot-upcoming"></div>
                <span>Upcoming</span>
            </div>
        </div>
        
        <div class="spacer"></div>
    </div>

    <script>
        let selectedDay = 0; // 0 = Sunday, 6 = Saturday

        function setDay(day) {
            selectedDay = day;
            document.getElementById('btnSunday').classList.toggle('active', day === 0);
            document.getElementById('btnSaturday').classList.toggle('active', day === 6);
            updateSettingsText();
            // Auto-generate on mobile for better UX, or wait for button on desktop
            if (window.innerWidth < 768) {
                generateCalendar();
            }
        }

        function updateSettingsText() {
            const startDate = new Date(document.getElementById('startDate').value);
            const dayName = selectedDay === 0 ? 'Sunday' : 'Saturday';
            const frequency = document.getElementById('frequency');
            const freqText = frequency.options[frequency.selectedIndex].text;
            
            const dateStr = startDate.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
            
            document.getElementById('currentSettings').innerHTML = 
                `Current: <strong>${freqText} on ${dayName}</strong> starting <strong>${dateStr}</strong>`;
        }

        function generateCalendar() {
            const startDateInput = document.getElementById('startDate').value;
            const count = parseInt(document.getElementById('count').value);
            const frequency = parseInt(document.getElementById('frequency').value);
            
            if (!startDateInput) return;

            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            const startDate = new Date(startDateInput);
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            // Adjust to selected day (Saturday or Sunday)
            let currentBooking = new Date(startDate);
            
            if (currentBooking.getDay() !== selectedDay) {
                let daysUntil = selectedDay - currentBooking.getDay();
                if (daysUntil < 0) {
                    daysUntil += 7;
                }
                currentBooking.setDate(currentBooking.getDate() + daysUntil);
            }

            updateSettingsText();

            for (let i = 0; i < count; i++) {
                // Calculate reminder date (1 month before, minus 1 day)
                const reminderDate = new Date(currentBooking);
                reminderDate.setMonth(reminderDate.getMonth() - 1);
                reminderDate.setDate(reminderDate.getDate() - 1);

                const bookingDateStr = formatDate(currentBooking);
                const reminderDateStr = formatDate(reminderDate);
                
                const isPast = currentBooking < today;
                const isTodayReminder = isSameDay(reminderDate, today);
                const isUpcoming = !isPast && !isTodayReminder;

                const daysUntilReminder = Math.ceil((reminderDate - today) / (1000 * 60 * 60 * 24));
                const daysUntilBooking = Math.ceil((currentBooking - today) / (1000 * 60 * 60 * 24));

                let statusClass = '';
                let statusBadge = '';
                
                if (isPast) {
                    statusClass = 'past';
                    statusBadge = '<span class="status-badge status-past">Past</span>';
                } else if (isTodayReminder) {
                    statusClass = 'today-reminder';
                    statusBadge = '<span class="status-badge status-today">Book Today!</span>';
                } else {
                    statusClass = 'upcoming';
                    statusBadge = '<span class="status-badge status-upcoming">Upcoming</span>';
                }

                let daysUntilHtml = '';
                if (!isPast) {
                    if (isTodayReminder) {
                        daysUntilHtml = `<div class="days-until urgent">⚠️ Book today for ${bookingDateStr}!</div>`;
                    } else if (daysUntilReminder > 0) {
                        daysUntilHtml = `<div class="days-until">⏰ Prepare in ${daysUntilReminder} days (${daysUntilBooking} until booking)</div>`;
                    } else if (daysUntilReminder < 0 && daysUntilBooking > 0) {
                        daysUntilHtml = `<div class="days-until urgent">⚠️ Reminder was ${Math.abs(daysUntilReminder)} days ago!</div>`;
                    }
                }

                const dayLabel = selectedDay === 0 ? 'Sun' : 'Sat';

                const card = document.createElement('div');
                card.className = `booking-card ${statusClass}`;
                card.innerHTML = `
                    <div class="card-header">
                        <div class="booking-number">${i + 1}</div>
                        ${statusBadge}
                    </div>
                    <div class="date-section">
                        <div class="date-label">📋 Reminder (${dayLabel} -1 month)</div>
                        <div class="date-value reminder">${reminderDateStr}</div>
                    </div>
                    <div class="date-section">
                        <div class="date-label">📅 Booking Date (${dayLabel})</div>
                        <div class="date-value booking">${bookingDateStr}</div>
                    </div>
                    ${daysUntilHtml}
                `;

                grid.appendChild(card);

                // Add frequency days for next booking
                currentBooking.setDate(currentBooking.getDate() + frequency);
                
                // Adjust to ensure it lands on the selected day
                if (currentBooking.getDay() !== selectedDay) {
                    let daysUntil = selectedDay - currentBooking.getDay();
                    if (daysUntil < 0) {
                        daysUntil += 7;
                    }
                    currentBooking.setDate(currentBooking.getDate() + daysUntil);
                }
            }
        }

        function formatDate(date) {
            const options = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
            return date.toLocaleDateString('en-US', options);
        }

        function isSameDay(date1, date2) {
            return date1.getFullYear() === date2.getFullYear() &&
                   date1.getMonth() === date2.getMonth() &&
                   date1.getDate() === date2.getDate();
        }

        // Event listeners
        document.getElementById('startDate').addEventListener('change', function() {
            updateSettingsText();
            if (window.innerWidth < 768) generateCalendar();
        });
        
        document.getElementById('frequency').addEventListener('change', function() {
            updateSettingsText();
            if (window.innerWidth < 768) generateCalendar();
        });
        
        document.getElementById('count').addEventListener('change', function() {
            if (window.innerWidth < 768) generateCalendar();
        });

        // Handle resize
        let resizeTimer;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(function() {
                // Adjust layout if needed
            }, 250);
        });

        // Generate on load
        generateCalendar();
    </script>
</body>
</html>
